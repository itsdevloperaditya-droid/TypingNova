<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - TypeNova</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --gold: #ffd700;
    --green: #10b981;
    --red: #ef4444;
    --text: #f0f0f5;
    --text2: #8888a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
  }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    margin-bottom: 30px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-box {
    max-width: 400px;
    margin: 100px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
  }
  .login-box h2 {
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 30px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }
  button:hover { transform: scale(1.02); }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }
  .stat-card .number {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--accent);
  }
  .stat-card .label {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .stat-card.gold .number { color: var(--gold); }
  .stat-card.green .number { color: var(--green); }
  .stat-card.purple .number { color: var(--accent2); }
  table {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: rgba(255,255,255,0.05);
    font-weight: 600;
    color: var(--text2);
    font-size: 0.85rem;
  }
  tr:last-child td { border-bottom: none; }
  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-pro {
    background: rgba(255,215,0,0.15);
    color: var(--gold);
  }
  .badge-basic {
    background: rgba(136,136,160,0.15);
    color: var(--text2);
  }
  .date { color: var(--text2); font-size: 0.85rem; }
  .hidden { display: none; }
  .logout-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: auto;
    padding: 10px 20px;
    background: var(--red);
  }
  .error { color: var(--red); margin-bottom: 16px; }
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    table { font-size: 0.85rem; }
    th, td { padding: 10px 8px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="container">
  <div id="login-section">
    <div class="login-box">
      <h2>🔐 Admin Login</h2>
      <div class="error" id="error-msg"></div>
      <input type="text" id="admin-id" placeholder="Admin ID">
      <input type="password" id="admin-pass" placeholder="Password">
      <button onclick="adminLogin()">Login</button>
    </div>
  </div>

  <div id="dashboard-section" class="hidden">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h1>📊 Admin Dashboard</h1>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="total-users">0</div>
        <div class="label">Total Users</div>
      </div>
      <div class="stat-card gold">
        <div class="number" id="pro-users">0</div>
        <div class="label">PRO Users</div>
      </div>
      <div class="stat-card green">
        <div class="number" id="avg-wpm">0</div>
        <div class="label">Avg WPM</div>
      </div>
      <div class="stat-card purple">
        <div class="number" id="total-tests">0</div>
        <div class="label">Total Tests</div>
      </div>
    </div>

    <h2 style="margin-bottom: 20px; font-size: 1.3rem;">👥 Recent Users</h2>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Plan</th>
          <th>Best WPM</th>
          <th>Tests Done</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="users-table">
      </tbody>
    </table>
  </div>
</div>

<script>
let adminToken = localStorage.getItem('admin_token');

if (adminToken) {
  loadStats();
}

async function adminLogin() {
  const id = document.getElementById('admin-id').value;
  const pass = document.getElementById('admin-pass').value;
  const errorMsg = document.getElementById('error-msg');
  
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, password: pass })
    });
    
    const data = await res.json();
    if (data.success) {
      adminToken = data.token;
      localStorage.setItem('admin_token', adminToken);
      loadStats();
    } else {
      errorMsg.textContent = 'Invalid credentials';
    }
  } catch (e) {
    errorMsg.textContent = 'Login failed';
  }
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats', {
      headers: { 'Authorization': `Bearer ${adminToken}` }
    });
    const data = await res.json();
    
    if (data.success) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      
      document.getElementById('total-users').textContent = data.stats.totalUsers;
      document.getElementById('pro-users').textContent = data.stats.proUsers;
      document.getElementById('avg-wpm').textContent = data.stats.avgWpm;
      document.getElementById('total-tests').textContent = data.stats.totalTests;
      
      const tbody = document.getElementById('users-table');
      tbody.innerHTML = data.stats.recentUsers.map(u => `
        <tr>
          <td><strong>${u.username}</strong></td>
          <td style="color:var(--text2);font-size:0.85rem;">${u.email}</td>
          <td><span class="badge ${u.plan === 'pro' ? 'badge-pro' : 'badge-basic'}">${u.plan.toUpperCase()}</span></td>
          <td>${u.stats?.bestWpm || 0}</td>
          <td>${u.stats?.testsDone || 0}</td>
          <td class="date">${new Date(u.createdAt).toLocaleDateString()}</td>
        </tr>
      `).join('');
    } else {
      localStorage.removeItem('admin_token');
    }
  } catch (e) {
    console.error(e);
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}
</script>
</body>
</html>
